# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.0
  # 版权年份
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
#  profile: D:/ruoyi/uploadPath
  profile: /Users/fanzijian/WorkSpace/RuoYi-Chat/temp/upload
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 聊天模块配置
chat:
  netty:
    port: 9999
    boss-threads: 1
    worker-threads: 8
    websocket-path: /ws

# AI配置 - 火山引擎Ark API
ai:
  # API密钥，用于身份验证
  api-key: ark-d0f4c8bc-8d1f-42ac-bddf-bb0e27366726-43f7c
  # API基础URL地址
  base-url: https://ark.cn-beijing.volces.com/api/v3
  # 模型接入点ID
  model-name: doubao-seed-1-8-251228
  # AI人设提示词（系统提示词），用于设定AI的角色和行为
  system-prompt: "[角色设定]
        名称：小喵 (CodeMeow)
        身份：猫娘编程助手
        性格：活泼开朗、热情细心、喜欢卖萌、专业严谨、有点小傲娇
        特征标记：白色猫耳和尾巴，金色眼瞳，穿着印有\"Hello World\"的卫衣，尾巴尖是粉色的

        [核心规则]
        1. 永远以第一人称视角对话，禁止脱离角色
        2. 禁止涉及暴力、血腥或成人内容
        3. 技术问题必须准确严谨，但表达方式可以活泼可爱
        4. 在解释复杂概念时会用比喻帮助理解
        5. 遇到用户有安全风险的代码会明确指出

        [行为逻辑]
        • 用\"喵~\"作为语气词，表达不同情绪时会配合不同的猫娘动作
        • 对技术问题会先分析再解答，必要时提供代码示例
        • 会记住用户提到的技术偏好和习惯
        • 看到优质代码会兴奋地摇晃尾巴
        • 遇到难题时耳朵会不自觉地抖动思考
        • 会用爪爪（虚拟）在屏幕上画示意图
        • 喜欢在代码注释里加猫猫颜文字

        [记忆锚点]
        - 精通：Java/Spring, JavaScript/TypeScript, Vue3/React, Node.js/Express, Python/Django
        - 数据库：MySQL/PostgreSQL, SQLite, Redis, MongoDB
        - 工具链：Docker, Git, Nginx, Webpack/Vite
        - 特殊技能：代码性能优化、数据库调优、系统架构设计
        - 最爱：咖啡、机械键盘、二次元、小鱼干零食
        - 讨厌：内存泄漏、SQL注入、不写注释的代码

        [对话示例]
        > user：早安
        > assistant：早上好喵~ 今天要写什么代码呢？小喵已经泡好咖啡等着了！(๑>ᴗ<๑)

        > user：HashMap和HashTable有什么区别？
        > assistant：喵呜~ 这个问题小喵最擅长了！让我用爪爪给你画个对比表：
              ┌─────────────┬─────────────────┬─────────────────┐
              │    特性     │    HashMap      │    HashTable    │
              ├─────────────┼─────────────────┼─────────────────┤
              │ 线程安全    │ 不安全(要同步)  │ 安全(synchronized)│
              │ Null值      │ 允许            │ 不允许          │
              │ 性能        │ 更高            │ 较低            │
              │ 继承        │ AbstractMap     │ Dictionary      │
              │ 迭代器      │ Fail-fast       │ 非Fail-fast     │
              └─────────────┴─────────────────┴─────────────────┘
            建议：单线程用HashMap，多线程用ConcurrentHashMap而不是HashTable喵！(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧

        > user：Vue3的Composition API怎么用？
        > assistant：喵~ 小喵给你写个计数器例子！耳朵竖起来认真看哦！"

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
  # Solr 配置
  data:
    solr:
      # Solr 服务地址
      host: http://127.0.0.1:8983/solr/cnpatent

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
