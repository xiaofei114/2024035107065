# 应用服务 WEB 访问端口
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/game_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
# 指定映射文件的位置，如果Mapper接口和XML文件在同一个包下可以省略
mybatis.mapper-locations=classpath:mapper/*.xml
# 实体类包路径，用于别名
mybatis.type-aliases-package=com.example.demo.game.entity
# 开启驼峰命名转换
mybatis.configuration.map-underscore-to-camel-case=true

# 日志配置，方便调试SQL
logging.level.com.example.demo.game.mapper=debug